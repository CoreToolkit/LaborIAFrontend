name: E2E Tests · Playwright

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (screenshots / videos on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build image + dispatch infra update
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/infrastructure'
    env:
      ACR_NAME: laboriaacr
      IMAGE_NAME: frontend
      ACR_URL: laboriaacr.azurecr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHORT_SHA"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL || 'http://localhost:8000' }} \
            --build-arg NEXT_PUBLIC_BACKEND_WS_BASE=${{ vars.NEXT_PUBLIC_BACKEND_WS_BASE || 'ws://localhost:8000/api/ws' }} \
            -t ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image to ACR
        run: |
          docker push ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ACR_URL }}/${{ env.IMAGE_NAME }}:latest

  trigger-deploy:
    name: Trigger Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/infrastructure'

    steps:
      - name: Dispatch to infrastructure repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TERRAFORM_REPO_TOKEN }}
          repository: CoreToolkit/LaborIAInfrastructure
          event-type: frontend-updated
          client-payload: |
            {
              "service": "frontend",
              "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "commit_sha": "${{ github.sha }}"
            }
